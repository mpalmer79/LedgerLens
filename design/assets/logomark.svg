<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Top ledger line -->
  <line x1="4" y1="10" x2="20" y2="10" />
  <!-- Bottom ledger line -->
  <line x1="4" y1="22" x2="20" y2="22" />
  <!-- Top transaction dot, right of the line -->
  <circle cx="25" cy="10" r="1.6" fill="currentColor" stroke="none" />
  <!-- Bottom transaction dot -->
  <circle cx="25" cy="22" r="1.6" fill="currentColor" stroke="none" />
  <!-- Connecting sweep — subtle L between the two dots -->
  <path d="M25 11.6 L25 20.4" stroke-width="1.5" opacity="0.55" />
</svg>

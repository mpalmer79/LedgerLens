<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- L-frame: reads as letter L and ledger book corner -->
  <path d="M 6 5 L 6 27 L 26 27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ledger row 1: small dot, lightest (brand-300) -->
  <line x1="11" y1="11" x2="20" y2="11" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  <circle cx="22.5" cy="11" r="1.0" fill="var(--brand-300, #8fb892)"/>

  <!-- Ledger row 2: medium dot (brand-500) -->
  <line x1="11" y1="16" x2="18" y2="16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  <circle cx="20.5" cy="16" r="1.4" fill="var(--brand-500, #3d7841)"/>

  <!-- Ledger row 3: large dot, darkest (brand-600) -->
  <line x1="11" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
  <circle cx="18.5" cy="21" r="1.8" fill="var(--brand-600, #2e5f32)"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2014"/>
      <stop offset="55%" stop-color="#15331c"/>
      <stop offset="100%" stop-color="#244c27"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3d22"/>
      <stop offset="100%" stop-color="#15321b"/>
    </linearGradient>
    <linearGradient id="trustCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5db568"/>
      <stop offset="100%" stop-color="#2e5f32"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#5db568" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5db568" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logomark -->
  <g transform="translate(72, 70)">
    <rect width="56" height="56" rx="12" fill="#5db568"/>
    <path d="M14 18 H42 M14 28 H42 M14 38 H28" stroke="#0e2014" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="38" r="8" fill="#0e2014"/>
    <path d="M36 38 L39 41 L44 35" stroke="#5db568" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="148" y="108" fill="#ffffff" font-family="'Inter', 'Helvetica', sans-serif" font-size="32" font-weight="600">LedgerLens</text>
  <text x="148" y="138" fill="#9bd2a4" font-family="'Inter', 'Helvetica', sans-serif" font-size="18" font-weight="500" letter-spacing="2">VERIFIED AI-ASSISTED BOOKKEEPING WORKFLOW</text>

  <!-- Left column — headline + tagline -->
  <g transform="translate(72, 220)">
    <text x="0" y="0" fill="#ffffff" font-family="'Newsreader', 'Georgia', serif" font-size="56" font-weight="500" letter-spacing="-0.5">
      <tspan x="0" dy="0">Messy transactions in.</tspan>
      <tspan x="0" dy="68">Verified ledger out.</tspan>
    </text>
    <text x="0" y="190" fill="#c9e2cd" font-family="'Inter', 'Helvetica', sans-serif" font-size="22" font-weight="400">
      <tspan x="0" dy="0">Small-business bookkeeping cleanup</tspan>
      <tspan x="0" dy="30">without blindly trusting AI.</tspan>
    </text>
  </g>

  <!-- Pipeline strip (full width across bottom-middle) -->
  <g transform="translate(72, 480)">
    <!-- 5 pipeline cards -->
    <g transform="translate(0, 0)">
      <rect width="200" height="64" rx="10" fill="url(#cardBg)" stroke="#3d6a3f" stroke-width="1.5"/>
      <text x="16" y="26" fill="#9bd2a4" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1</text>
      <text x="16" y="50" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="500">Messy transactions</text>
    </g>
    <text x="216" y="40" fill="#5db568" font-family="'Inter', sans-serif" font-size="22" font-weight="500">→</text>
    <g transform="translate(240, 0)">
      <rect width="200" height="64" rx="10" fill="url(#cardBg)" stroke="#5db568" stroke-width="1.5"/>
      <text x="16" y="26" fill="#9bd2a4" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2</text>
      <text x="16" y="50" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="500">Memory + Rules</text>
    </g>
    <text x="456" y="40" fill="#5db568" font-family="'Inter', sans-serif" font-size="22" font-weight="500">→</text>
    <g transform="translate(480, 0)">
      <rect width="200" height="64" rx="10" fill="url(#cardBg)" stroke="#d9a44a" stroke-width="1.5"/>
      <text x="16" y="26" fill="#f0d39b" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">STEP 3</text>
      <text x="16" y="50" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="500">Review routing</text>
    </g>
    <text x="696" y="40" fill="#5db568" font-family="'Inter', sans-serif" font-size="22" font-weight="500">→</text>
    <g transform="translate(720, 0)">
      <rect width="200" height="64" rx="10" fill="url(#cardBg)" stroke="#5db568" stroke-width="2"/>
      <text x="16" y="26" fill="#9bd2a4" font-family="'Inter', sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4</text>
      <text x="16" y="50" fill="#ffffff" font-family="'Inter', sans-serif" font-size="16" font-weight="500">Verified ledger</text>
    </g>
  </g>

  <!-- Right column — trust card -->
  <g transform="translate(740, 200)">
    <rect width="380" height="220" rx="20" fill="url(#trustCard)"/>
    <rect width="380" height="220" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <text x="30" y="46" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="600" letter-spacing="2">TRUST BOUNDARY</text>
    <text x="30" y="118" fill="#ffffff" font-family="'Newsreader', serif" font-size="64" font-weight="600">100%</text>
    <text x="30" y="152" fill="#ffffff" font-family="'Inter', sans-serif" font-size="18" font-weight="500">verified finalized demo ledger</text>
    <text x="30" y="184" fill="#e6f3e8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">Workflow-level trust metric — not</text>
    <text x="30" y="202" fill="#e6f3e8" font-family="'Inter', sans-serif" font-size="13" font-weight="400">raw model accuracy.</text>
  </g>

  <!-- Footer -->
  <text x="72" y="595" fill="#9bd2a4" font-family="'Inter', sans-serif" font-size="14" font-weight="400">
    Portfolio project by Michael Palmer · github.com/mpalmer79
  </text>
</svg>

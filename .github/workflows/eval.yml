name: Run eval

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset version (e.g. v0)'
        required: true
        default: 'v0'
        type: string
      categorizer:
        description: 'Categorizer to run'
        required: true
        default: 'claude-haiku-v1'
        type: choice
        options:
          - stub
          - claude-haiku-v1

permissions:
  contents: write  # Required to commit artifacts back to the repo

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run eval
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL_PRIMARY: claude-haiku-4-5-20251001
          ANTHROPIC_MODEL_FALLBACK: claude-sonnet-4-6
          CORS_ORIGINS: '["http://localhost:3000"]'
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          LEDGERLENS_AUTO_QUEUE_THRESHOLD: '0.90'
          LEDGERLENS_RETRIEVAL_TOP_K: '5'
          LEDGERLENS_REVIEW_QUEUE_THRESHOLD: '0.60'
          LOG_LEVEL: INFO
        run: |
          python -m ledgerlens.evals.run \
            --dataset ${{ inputs.dataset }} \
            --categorizer ${{ inputs.categorizer }} \
            --datasets-root ${{ github.workspace }}/evals/datasets \
            --runs-dir ${{ github.workspace }}/evals/runs

      - name: Upload eval artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ inputs.dataset }}-${{ inputs.categorizer }}-${{ github.run_id }}
          path: evals/runs/*.json
          retention-days: 90

      - name: Commit eval artifact to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evals/runs/
          if git diff --cached --quiet; then
            echo "No new eval artifact to commit"
          else
            git commit -m "eval: ${{ inputs.categorizer }} on ${{ inputs.dataset }} (run ${{ github.run_id }})"
            git push
          fi

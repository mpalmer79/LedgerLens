version: 2
updates:
  # Frontend (Next.js + Vitest)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope

    # ── Major-version policy ──────────────────────────────────────────
    # Major upgrades can break the build (Tailwind 3→4 broke PostCSS,
    # TypeScript 5→6 changes type semantics). Ignore major bumps for
    # critical dependencies — they require manual migration work, not
    # a dependabot auto-PR.
    #
    # See docs/DEPENDENCY_UPDATE_POLICY.md for the full policy.
    ignore:
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]

    groups:
      minor-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - next
          - react
          - react-dom
          - tailwindcss
          - typescript
      next:
        patterns:
          - next
          - "@next/*"
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      vitest:
        patterns:
          - vitest
          - "@vitest/*"
          - vite

  # Backend (FastAPI + SQLAlchemy + Anthropic SDK)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      fastapi:
        patterns:
          - fastapi
          - starlette
          - uvicorn*
      sqlalchemy:
        patterns:
          - sqlalchemy
          - alembic
          - psycopg*

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope

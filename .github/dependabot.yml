version: 2
updates:
  # Frontend (Next.js + Vitest)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      next:
        patterns:
          - next
          - "@next/*"
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      vitest:
        patterns:
          - vitest
          - "@vitest/*"
          - vite

  # Backend (FastAPI + SQLAlchemy + Anthropic SDK)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      fastapi:
        patterns:
          - fastapi
          - starlette
          - uvicorn*
      sqlalchemy:
        patterns:
          - sqlalchemy
          - alembic
          - psycopg*

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope

# Nixpacks build configuration for LedgerLens backend.
#
# Why this file exists: Nixpacks' auto-generated Python build copies
# pyproject.toml first and runs `pip install .` BEFORE copying the
# rest of the source. Our package layout (src/ledgerlens/) means the
# install step can't find the package source. This config copies
# everything first, then installs.

providers = ["python"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip build setuptools",
  ". /opt/venv/bin/activate && pip install .",
]

[phases.install.dependsOn]
phases = ["setup"]

[start]
cmd = "uvicorn ledgerlens.main:app --host 0.0.0.0 --port $PORT"
